services:
  orchestrator:
    build: ./orchestrator
    ports:
      - "8081:8080"
    volumes:
      - ./volumes:/volumes
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama: