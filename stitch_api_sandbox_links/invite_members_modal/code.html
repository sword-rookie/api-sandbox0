<script>
        // Simple Micro-interaction for UI feel
        const sendBtn = document.querySelector('.bg-primary-container');
        const toast = document.getElementById('toast');
        const modal = document.querySelector('.glass-panel');
        const backdrop = document.querySelector('.bg-background/60');

        sendBtn.addEventListener('click', () => {
            sendBtn.innerHTML = '<span class="animate-spin material-symbols-outlined">progress_activity</span>';
            
            setTimeout(() => {
                modal.classList.add('scale-95', 'opacity-0');
                backdrop.classList.add('opacity-0');
                
                setTimeout(() => {
                    toast.classList.remove('translate-y-20', 'opacity-0');
                    toast.classList.add('translate-y-0', 'opacity-100');
                    
                    setTimeout(() => {
                        toast.classList.remove('translate-y-0', 'opacity-100');
                        toast.classList.add('translate-y-20', 'opacity-0');
                        // In a real app, this would route or close
                    }, 3000);
                }, 400);
            }, 800);
        });

        // Toggle radio visual states (since sr-only is used)
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('input[type="radio"]').forEach(r => {
                    r.nextElementSibling.classList.remove('border-primary-container', 'bg-primary-container/5');
                    r.nextElementSibling.querySelector('.material-symbols-outlined').classList.remove('text-primary-container');
                    r.nextElementSibling.querySelector('.bg-primary-container').classList.add('opacity-0');
                });
                if (e.target.checked) {
                    e.target.nextElementSibling.classList.add('border-primary-container', 'bg-primary-container/5');
                    e.target.nextElementSibling.querySelector('.material-symbols-outlined').classList.add('text-primary-container');
                    e.target.nextElementSibling.querySelector('.bg-primary-container').classList.remove('opacity-0');
                }
            });
        });
    </script>
